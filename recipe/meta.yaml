{% set pypi_url = "https://pypi.io/packages/source/" %}
{% set python_min = "3.10" %}
{% set name = "xdem" %}
{% set version = "0.2.0" %}

{% set github_url = "https://github.com/GlacioHack/xdem" %}

package:
  name: {{ name | lower }}
  version: {{ version }}

source:
  url: {{ github_url }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 959657b6c98742f5a9872aa763fa25f5ac3392639adec687848a900d75bb646b

build:
  number: 0
  # To circumvent version generated by setuptools_scm
  script_env:
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  script: {{ PYTHON }} -m pip install . -vv
  noarch: python


requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=64
    - setuptools_scm >=8,<9.0
    - wheel
  run:
    - pip
    - python >={{ python_min }},<3.14

    # Required dependency
    - geoutils ==0.2.2

    # First-order dependencies of the above
    - geopandas >=0.12.0
    - rasterio >=1.3,<2
    - scipy =1.*

    # Second order
    - pyproj >=3.4,<4
    - numpy >=1,<3
    - affine
    - pandas
    - pyogrio
    - shapely

test:
  requires:
    - python {{ python_min }}
  imports:
    - xdem

about:
  home: {{ github_url }}
  license: Apache-2.0
  license_file: LICENSE
  summary: Analysis of digital elevation models and elevation point clouds
  doc_url: https://xdem.readthedocs.io
  dev_url: https://github.com/GlacioHack/xdem

extra:
  recipe-maintainers:
    - erikmannerfelt
    - adehecq
    - rhugonnet
